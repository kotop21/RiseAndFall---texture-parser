version: '3'

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  LDFLAGS: "-X 'main.Version={{.VERSION}}' -s -w"

tasks:
  mkdir:
    cmds:
      - mkdir -p bin

  run:
    desc: "Run the converter"
    cmds:
      - go run ./cmd/convertor-core unpack

  build-converter:
    desc: "Build only the converter for the current OS"
    deps: [mkdir]
    cmds:
      - go build -ldflags="{{.LDFLAGS}}" -o bin/converter ./cmd/convertor-core

  build-converter-win:
    desc: "Build converter for Windows (64-bit)"
    deps: [mkdir]
    cmds:
      - CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="{{.LDFLAGS}}" -o bin/converter.exe ./cmd/convertor-core

  build-converter-mac:
    desc: "Build converter for macOS (Apple Silicon)"
    deps: [mkdir]
    cmds:
      - CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="{{.LDFLAGS}}" -o bin/converter-mac ./cmd/convertor-core

  build-converter-linux:
    desc: "Build converter for Linux (64-bit)"
    deps: [mkdir]
    cmds:
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="{{.LDFLAGS}}" -o bin/converter-linux ./cmd/convertor-core

  build-fixer-win:
    desc: "Build matte-fixer only for Windows"
    deps: [mkdir]
    cmds:
      - CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="{{.LDFLAGS}}" -o bin/matte-fixer.exe ./cmd/matte-fixer

  build:
    desc: "Build current OS binaries"
    cmds:
      - task: build-converter

  build-all:
    desc: "Build all binaries for all platforms"
    cmds:
      - task: build-converter-win
      - task: build-converter-mac
      - task: build-converter-linux
      - task: build-fixer-win

  default:
    cmds:
      - task: run
