name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-converters:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: converter.exe
            archive: converter-windows-amd64

          - goos: linux
            goarch: amd64
            binary: converter-linux
            archive: converter-linux-amd64

          - goos: darwin
            goarch: arm64
            binary: converter-mac
            archive: converter-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Converter
        run: |
          mkdir -p dist
          CGO_ENABLED=0 \
          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          go build \
          -ldflags="-s -w -X 'main.Version=${GITHUB_REF_NAME}'" \
          -o dist/${{ matrix.binary }} \
          ./cmd/convertor

      - name: Prepare Package
        run: |
          mkdir package
          cp dist/${{ matrix.binary }} package/

          mkdir package/1_original
          mkdir package/2_editing
          mkdir package/3_packed

          cat > package/README.txt << 'EOF'
          Supported formats:
          - .tga
          - .dds
          - .sst

          Workflow:
          1_original  - source textures
          2_editing   - extracted png files
          3_packed    - packed textures

          Commands:
          converter unpack
          converter pack
          EOF

      - name: Add Windows Scripts
        if: matrix.goos == 'windows'
        run: |
          cat > package/unpack.bat << 'EOF'
          @echo off
          converter.exe unpack
          pause
          EOF

          cat > package/pack.bat << 'EOF'
          @echo off
          converter.exe pack
          pause
          EOF

      - name: Upload Converter Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: package/

  build-matte-builders:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: matte-builder.exe
            archive: matte-builder-windows-amd64

          - goos: linux
            goarch: amd64
            binary: matte-builder-linux
            archive: matte-builder-linux-amd64

          - goos: darwin
            goarch: arm64
            binary: matte-builder-mac
            archive: matte-builder-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Matte Builder
        run: |
          mkdir -p dist
          CGO_ENABLED=0 \
          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          go build \
          -ldflags="-s -w -X 'main.Version=${GITHUB_REF_NAME}'" \
          -o dist/${{ matrix.binary }} \
          ./cmd/matte-builder

      - name: Prepare Package
        run: |
          mkdir package
          cp dist/${{ matrix.binary }} package/

          cat > package/README.txt << 'EOF'
          Matte Builder

          Supported Input Formats:
          - .png, .jpg, .jpeg

          Output Format:
          - Always outputs .png files

          Commands:

          Full mode (generates <diffuse>.png and <normal>_bump.png):
          matte-builder <diffuse> <ao> <normal> <specular>

          Diffuse & AO only (generates <diffuse>.png with baked AO):
          matte-builder --diffuse <diffuse> <ao>

          Normal & Specular only (generates <normal>_bump.png with packed Specular):
          matte-builder --normal <normal> <specular>
          EOF

      - name: Upload Matte Builder Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: package/
